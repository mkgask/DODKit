# DECISIONS.yml
# DOD（決定指向開発）用の現在有効な決定事項一覧テンプレート（可変）
# このファイルを、現在有効なプロジェクト決定と実装拘束条件の正本として扱います。
# 次の決定のために広い履歴を読み直さなくて済むよう、各項目は簡潔に保ちます。
# 背景、トレードオフ、却下案、調査メモは records/{discussion-id}.md に記録します。
# records/{discussion-id}.md は議論履歴専用です。
# 更新が前提になる項目（status、残作業、後で更新するアクション項目）を置いてはいけません。

version: "1.0"
decisions:

  # このカテゴリ名は、関連する決定事項をまとめるドメイン名に置き換えます。
  カテゴリ名:
    - # 必須。{category}-{sequence}-{shortname} のような安定したIDを使います。
      id: category-001-short-name
      # 必須。決定内容を1行で書きます。
      title: 決定内容を1行で書く
      # 必須。現在の実装を拘束する理由を、簡潔に1〜3行程度で書きます。
      # 議論の全履歴ではなく、今効いている拘束理由を書くことが重要です。
      reason: この決定が今の実装を拘束する理由を書く
      # 任意。基本的には次の既定ステータスを使います。
      # - ⚠️Discussion In Progress
      # - ⚠️Discussion Approved
      # - ⚠️Implementing
      # - ✅️Implementation Approved
      # ⛔️On Hold や ⛔️Cancelled は本当に必要な場合だけ使います。
      status: "⚠️Discussion In Progress"
      # 任意。1つの議論から生まれた決定群であれば、その議論履歴ファイルを指します。
      link: "records/category-001-discussion-topic.md"
      # 任意。独立して有効なルールを単独で読みやすくしたいときだけ子決定を追加します。
      sub_decisions:
        - # 必須。親決定から派生した安定した子IDを使います。
          id: category-001-1-sub-decision
          # 必須。独立して有効なルールを1行で書きます。
          title: 独立して有効なルールを1つ書く
          # 必須。このルールが今の実装を拘束する理由を書きます。
          reason: このルールが今の実装を拘束する理由を書く
          # 任意。トップレベル決定と同じステータス語彙を使います。
          status: "⚠️Discussion Approved"
          # 親と同じ議論履歴を共有する場合は link を省略します。
          # 別の議論履歴を指す必要があるときだけ link を追加します。
          # link: "records/category-002-another-discussion.md"
          # 任意。これ以上の独立ルールがなければ [] のままにします。
          sub_decisions: []

  # 必要に応じてカテゴリや決定事項を増やします。
  # 大きな1件を肥大化させるより、小さな決定を複数並べるほうを優先します。
  # 次の実装判断を変えうるルールは、すべてこのファイルに存在させます。