version: "1.0"
decisions:

  Copilot カスタマイズ:
    - id: agent-001-dod-custom-agent
      title: DOD専用のVS Codeカスタムエージェントを作成する
      reason: DODの決定に沿った実装を維持するため、永続的なペルソナとツール制約が必要。
      status: "✅️Implementation Approved"
      link: "records/agent-001-dod-custom-agent.md"
      sub_decisions:
        - id: agent-001-1-workspace-agent-location
          title: DODカスタムエージェントを .github/agents 配下のワークスペースファイルとして定義する
          reason: ユーザー固有設定に依存せず、リポジトリ内でエージェントを発見可能にするため。
          status: "✅️Implementation Approved"
        - id: agent-001-2-phase-and-artifact-guidance
          title: カスタムエージェントにDODフェーズと成果物の明示的な指示を持たせる
          reason: 議論と実装の振る舞いを明示的に強制し、決定ドリフトを減らすため。
          status: "✅️Implementation Approved"
        - id: agent-001-3-shared-workspace-reusability
          title: ローカル手作業なしで再利用できる共有ワークスペースエージェントにする
          reason: マシン固有の設定に依存せず、共有ランタイムとして扱える必要があるため。
          status: "✅️Implementation Approved"
        - id: agent-001-4-discussion-record-template-usage
          title: 新しい records ファイルはインストール済み discussion-record テンプレートから作成することを必須にする
          reason: テンプレート利用を必須化することで記録構造の一貫性を保ち、場当たり的な形式の記録作成を防ぐため。
          status: "✅️Implementation Approved"

  インストーラー:
    - id: agent-002-installer-delivery
      title: DODエージェントパッケージ用のリポジトリインストーラーを提供する
      reason: インストーラー提供の決定を置き、その下の現在有効なサブ決定もこの一覧に明示する。
      status: "✅️Implementation Approved"
      link: "records/agent-002-installer-delivery.md"
      sub_decisions:
        - id: agent-002-1-installer-template-assets
          title: インストーラー入力としてテンプレートファイルを使用する
          reason: ソース資産と出力先を分離し、将来のCLI拡張を安全にするため。
          status: "✅️Implementation Approved"
        - id: agent-002-2-copilot-only
          title: 初期のインストーラーCLI対応を copilot のみに限定する
          reason: 将来のCLI拡張余地を残しつつ、初期リリースのリスクを下げるため。
          status: "✅️Implementation Approved"
        - id: agent-002-3-idempotent-reruns
          title: インストーラーは繰り返し実行しても安全にする
          reason: 再実行時に設定の重複や既存成果物の破損を起こしてはならないため。
          status: "✅️Implementation Approved"
        - id: agent-002-4-workspace-scope-only
          title: インストーラーの書き込み先を意図したワークスペースカスタマイズパスに限定する
          reason: ユーザー全体やシステム全体の場所ではなく、宣言したワークスペース範囲のみに留める必要があるため。
          status: "✅️Implementation Approved"
        - id: agent-002-5-explicit-cli-target-validation
          title: 明示的なCLIターゲット指定を必須にし、未対応ターゲットを拒否する
          reason: インストーラーの挙動を予測可能に保ち、未対応モードの黙認を防ぐため。
          status: "✅️Implementation Approved"
        - id: agent-002-6-fail-fast-and-validation-guidance
          title: 明示的なエラーで早期失敗し、インストール後の確認手順を出力する
          reason: 異常時は明確に停止し、成功後の検証方法も案内する必要があるため。
          status: "✅️Implementation Approved"
        - id: agent-002-7-copilot-target-name
          title: 初期インストーラーCLIターゲット値として `copilot` を使用する
          reason: 初期リリースで安定した明示ターゲット名を固定し、実行方法と検証方法のドリフトを防ぐため。
          status: "✅️Implementation Approved"
        - id: agent-002-8-existing-file-overwrite-policy
          title: 既存ファイルは既定で維持し、バックアップなしで上書き前に確認する
          reason: 既存のワークスペースファイルをサイレントに置き換えず、余分なバックアップ成果物も増やさないようにするため。
          status: "✅️Implementation Approved"
        - id: agent-002-9-initial-copilot-template-manifest
          title: templates/agent.md と templates/DECISIONS.yml を初期 Copilot ワークスペースパスへ配置する
          reason: 初期リリースでテンプレートファイルセットと配置先対応を明示し、インストーラー挙動を決定的に保つため。
          status: "✅️Implementation Approved"
        - id: agent-002-10-decisions-yml-never-overwrite
          title: --force 指定時を含め、既存の DECISIONS.yml は絶対に上書きしない
          reason: DECISIONS.yml にはプロジェクト固有の決定記録が含まれており、上書きすると永久に失われるため、インストーラーは常に保護しなければならない。
          status: "✅️Implementation Approved"
        - id: agent-002-11-no-template-fallback-copy
          title: DECISIONS.yml が既に存在する場合に DECISIONS.template.yml のような別名コピーを残さない
          reason: 別名コピーはファイルシステムの余分なノイズになるだけで実質的な価値がなく、元のテンプレートはソースリポジトリから常に参照可能なため。
          status: "✅️Implementation Approved"
        - id: agent-002-12-discussion-record-template-install
          title: インストーラー管理のテンプレート資産に templates/discussion-record.md を含める
          reason: 新しい決定記録は一貫したテンプレートから開始されるべきであり、インストーラーが他のテンプレートと同様にこの資産を配布する必要があるため。
          status: "✅️Implementation Approved"

    - id: agent-003-raw-github-install
      title: raw.githubusercontent.com経由でinstall.sh | bashの導線を提供する
      reason: GitHub Raw配信で直接スクリプト配布が可能であり、正しいRawホストを使うことでドメイン誤りによる失敗を回避できる。
      status: "✅️Implementation Approved"
      link: "records/agent-003-raw-github-install.md"
      sub_decisions:
        - id: agent-003-1-curl-fssl-command
          title: install.sh のワンライナーは curl -fsSL を使用する
          reason: HTTPエラーで失敗しつつ、シェル導入時に静かで診断可能な挙動を保つ必要があるため。
          status: "✅️Implementation Approved"
        - id: agent-003-2-stable-ref-guidance
          title: インストールURLは安定した ref を既定とし、再現性のためにコミット固定を許可する
          reason: 安定した既定値を持たせつつ、必要時には決定的な導入も選べるようにするため。
          status: "✅️Implementation Approved"

  テンプレート:
    - id: agent-004-installer-template-details
      title: インストーラーテンプレートファイルの構成と出力マッピングを定義する
      reason: テンプレート利用自体は有効だが、テンプレート構成と出力先対応は実装前に独立決定として明示する必要がある。
      status: "✅️Implementation Approved"
      link: "records/agent-004-installer-template-details.md"
      sub_decisions:
        - id: agent-004-1-template-path
          title: 初期テンプレートは templates/agent.md に置く
          reason: トップレベルの配置は当面シンプルで、将来拡張の余地も残せるため。
          status: "✅️Implementation Approved"
        - id: agent-004-2-copy-manifest
          title: インストーラー内にコピー対象リストを保持する
          reason: 1ファイル構成でも将来拡張に備えて、明示的な対応表を持つ必要があるため。
          status: "✅️Implementation Approved"
        - id: agent-004-3-source-destination-rule
          title: コピー元は raw.githubusercontent.com、コピー先はカレントディレクトリ相対パスとする
          reason: インストーラー実行時の入出力解決を明示的かつ一貫して扱うため。
          status: "✅️Implementation Approved"
        - id: agent-004-4-separate-template-sources-and-outputs
          title: テンプレートのソースファイルとインストール先の出力ファイルを分離する
          reason: ファイル対応を安定かつ理解可能に保つには、テンプレート資産と出力結果を混在させてはならないため。
          status: "✅️Implementation Approved"
        - id: agent-004-5-discussion-record-template-destination
          title: discussion-record テンプレートを .dodkit/templates/discussion-record.md にインストールする
          reason: DODKit 専用の隠しディレクトリでワークスペース直下のノイズを抑えつつ、将来のテンプレート拡張でも安定したツール中立の配置先を確保できるため。
          status: "✅️Implementation Approved"

    - id: agent-005-lightweight-template-roles
      title: 独立した決定フェーズを増やさずに軽量なテンプレート役割を定義する
      reason: DOD は軽量性を保つ必要があり、現在のAI摩擦はフェーズ不足ではなく成果物の役割重複から生じているため。
      status: "✅️Implementation Approved"
      link: "records/agent-005-lightweight-template-roles.md"
      sub_decisions:
        - id: agent-005-1-two-phase-dod
          title: 決定の文書化は第3フェーズを作らず議論フェーズ内で完了させる
          reason: 議論フェーズは決定が明示されるまで終わらないため、独立した決定フェーズを増やしても実務上の価値は小さい。
          status: "✅️Implementation Approved"
        - id: agent-005-2-decisions-template-scanability
          title: DECISIONS.yml テンプレートは人間の一覧性を優先して軽く保つ
          reason: 正本の決定一覧は素早く走査できる必要があるため、既定の決定形は最小限に保つ。
          status: "✅️Implementation Approved"
        - id: agent-005-3-contract-details-as-needed
          title: 契約詳細は必要な分だけ追加のサブ決定として表現する
          reason: 決定契約は明示すべきだが、すべてのノードに同じ契約フィールドを強制すると一覧性が落ち、重複作業も増えるため。
          status: "✅️Implementation Approved"
        - id: agent-005-4-discussion-record-minimal-structure
          title: discussion-record テンプレートは履歴に絞って軽量に保つ
          reason: 記録テンプレートは最小限の議論履歴だけを必須にし、DECISIONS.yml 上の現在拘束条件を重複させないようにする必要があるため。
          status: "✅️Implementation Approved"
        - id: agent-005-5-optional-record-detail
          title: discussion-record の根拠と詳細な昇格メタデータは任意にする
          reason: 補助情報を任意にすることで、小さな議論でも使いやすさを保ちつつ、必要時の深い記録余地も確保できるため。
          status: "✅️Implementation Approved"
