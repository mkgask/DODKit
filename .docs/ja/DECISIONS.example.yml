# DECISIONS.yml
# DOD（決定指向開発）用 現在有効な決定事項一覧（可変）
# 構造：カテゴリ → メイン決定事項 → サブ決定事項（最大5層まで許容）
# 新しい決定時はこのファイルだけをまず参照。詳細経緯は対応する records ファイルを参照。
# サブ決定は別の履歴を指す必要がない限り、最も近い親の link を継承する。
# トップレベルカテゴリは関心領域またはドメインで分ける。
# 仕様・設計・実装・テストの関心は、それ自体が拘束条件になる場合に、
# 関連カテゴリ内の決定事項またはサブ決定として表現する。

version: "1.0"
decisions:

  Feature:
    - id: feature-001-profile-editing
      title: ユーザープロフィール編集機能
      status: "⚠️Implementing"
      reason: この機能が現在の UI、API、バリデーション実装を横断して拘束している
      link: "records/feature-001-profile-editing.md"
      sub_decisions:
        - id: feature-001-1-spec-fields
          title: 編集可能項目とバリデーション規則
          status: "⚠️Discussion Approved"
          reason: 実装前に API とフォームスキーマで許可項目を一致させる必要がある
          sub_decisions: []
        - id: feature-001-2-design-boundary
          title: サーバーとクライアントの責務境界
          status: "⚠️Implementing"
          reason: コンポーネント構成と更新フローが、状態とアクションの配置に依存する
          sub_decisions: []
        - id: feature-001-3-test-acceptance
          title: 正常系と拒否系の受け入れテスト範囲
          status: "⚠️Discussion Approved"
          reason: 正しい更新成功と不正入力拒否を検証しない限り、この機能は完了と見なせない
          sub_decisions: []

  アーキテクチャ:
    - id: r-007
      title: フロントエンドフレームワークの選定
      status: "✅️Implementation Approved"
      reason: App Routerの問題が解決されず、データロードのシンプルさとパフォーマンスを優先
      sub_decisions:
        - id: r-007-1
          title: ルーティング方式
          status: "⚠️Discussion Approved"
          reason: File-based routingを採用し、ネストされたルートを活用
          sub_decisions: []
        - id: r-007-2
          title: データフェッチ戦略
          status: "⚠️Implementing"
          reason: Server Componentsを優先し、Client Componentsは最小限に
        - id: r-007-3
          title: フォーム相互作用の境界
          status: "⚠️Discussion In Progress"
          reason: 複雑なフォーム状態は、必要最小限のClient Componentに閉じ込める

  データベース:
    - id: r-001
      title: プライマリデータベースの採用
      status: "✅️Implementation Approved"
      reason: ACIDトランザクションの強さと拡張性を重視
      sub_decisions:
        - id: r-001-1
          title: 読み取りスケーリング
          status: "⛔️On Hold"
          reason: Read Replica + Citrusで補完
        - id: r-001-2
          title: スキーママイグレーション運用
          status: "⚠️Discussion Approved"
          reason: デプロイ前に、レビュー済みのforward-only migrationをCIで実行する

  認証・セキュリティ:
    - id: r-012
      title: 認証方式の選択
      status: "⚠️Discussion In Progress"
      reason: セキュリティと開発速度のバランスが最適
      sub_decisions:
        - id: r-012-1
          title: セッション保存戦略
          status: "⚠️Discussion Approved"
          reason: 失効制御を中央で維持できるよう、サーバー側セッションを採用する
        - id: r-012-2
          title: MFA導入範囲
          status: "⚠️Discussion In Progress"
          reason: まず管理者ロールにMFAを必須化し、その後に全ユーザーへ拡張する

  運用・CI/CD:
    - id: r-015
      title: 依存関係更新の自動化
      status: "⚠️Implementing"
      reason: セキュリティパッチの迅速対応のため
      sub_decisions:
        - id: r-015-1
          title: 更新頻度とレビュー
          status: "⚠️Discussion Approved"
          reason: 週次で自動PR作成、手動レビュー必須
        - id: r-015-2
          title: 依存関係更新のマージ条件
          status: "✅️Implementation Approved"
          reason: テスト、型チェック、セキュリティレビュー通過後にのみマージする
