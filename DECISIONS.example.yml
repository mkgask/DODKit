# DECISIONS.yml
# Current active decision list (mutable) for DOD (Decision Oriented Development)
# Structure: category -> main decisions -> sub-decisions (up to 5 levels)
# Start by checking only this file when making a new decision.
# See the corresponding record file for detailed decision history.
# Sub-decisions inherit the nearest parent link unless they point to a different record.
# Use top-level categories for concern/domain grouping.
# Express specification, design, implementation, and test concerns as decisions or sub-decisions
# inside the relevant category when they independently constrain work.

version: "1.0"
decisions:

  Feature:
    - id: feature-001-profile-editing
      title: User profile editing capability
      status: "⚠️Implementing"
      reason: This feature constrains current UI, API, and validation work across the app
      link: "records/feature-001-profile-editing.md"
      sub_decisions:
        - id: feature-001-1-spec-fields
          title: Editable fields and validation rules
          status: "⚠️Discussion Approved"
          reason: The API and form schema must agree on allowed fields before implementation
          sub_decisions: []
        - id: feature-001-2-design-boundary
          title: Server and client responsibility boundary
          status: "⚠️Implementing"
          reason: Component structure and mutation flow depend on where state and actions live
          sub_decisions: []
        - id: feature-001-3-test-acceptance
          title: Acceptance coverage for success and rejection paths
          status: "⚠️Discussion Approved"
          reason: The feature is incomplete unless valid updates succeed and invalid input is rejected
          sub_decisions: []

  Architecture:
    - id: r-007
      title: Frontend framework selection
      status: "✅️Implementation Approved"
      reason: App Router issues remained unresolved; prioritize simple data loading and performance
      sub_decisions:
        - id: r-007-1
          title: Routing strategy
          status: "⚠️Discussion Approved"
          reason: Adopt file-based routing and leverage nested routes
          sub_decisions: []
        - id: r-007-2
          title: Data fetching strategy
          status: "⚠️Implementing"
          reason: Prefer Server Components and minimize Client Components
        - id: r-007-3
          title: Form interaction boundary
          status: "⚠️Discussion In Progress"
          reason: Keep complex interactive form state in narrowly scoped client components

  Database:
    - id: r-001
      title: Primary database adoption
      status: "✅️Implementation Approved"
      reason: Prioritize strong ACID transactions and scalability
      sub_decisions:
        - id: r-001-1
          title: Read scaling
          status: "⛔️On Hold"
          reason: Read Replica complemented by Citrus
        - id: r-001-2
          title: Schema migration workflow
          status: "⚠️Discussion Approved"
          reason: Run reviewed forward-only migrations in CI before deployment

  Authentication and Security:
    - id: r-012
      title: Authentication approach selection
      status: "⚠️Discussion In Progress"
      reason: Best balance between security and development speed
      sub_decisions:
        - id: r-012-1
          title: Session storage strategy
          status: "⚠️Discussion Approved"
          reason: Use server-side sessions so revocation remains centrally enforceable
        - id: r-012-2
          title: MFA rollout scope
          status: "⚠️Discussion In Progress"
          reason: Require MFA first for admin roles before expanding to all users

  Operations and CI/CD:
    - id: r-015
      title: Automated dependency updates
      status: "⚠️Implementing"
      reason: Enable rapid response to security patches
      sub_decisions:
        - id: r-015-1
          title: Update frequency and review policy
          status: "⚠️Discussion Approved"
          reason: Create automated PRs weekly and require manual review
        - id: r-015-2
          title: Dependency update merge gate
          status: "✅️Implementation Approved"
          reason: Merge only after tests, type checks, and security review pass
